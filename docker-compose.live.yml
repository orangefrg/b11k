services:
  b11k-live-postgis:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${B11K_PG_DATABASE:-b11k_db}
      POSTGRES_USER: ${B11K_PG_USER:-b11k}
      POSTGRES_PASSWORD: ${B11K_PG_PASSWORD:?Set B11K_PG_PASSWORD in .env}
    ports:
      - "${B11K_PG_HOST_PORT:-25432}:5432"
    volumes:
      - b11k-live-postgis-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - b11k-live-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  b11k-live-app:
    image: golang:1.24-alpine
    working_dir: /workspace
    command: >
      sh -c '
        until nc -z "$$B11K_PG_HOST" "$$B11K_PG_PORT"; do
          echo "Waiting for PostGIS at $$B11K_PG_HOST:$$B11K_PG_PORT..."
          sleep 2
        done
        go mod download
        go run ./cmd
      '
    restart: unless-stopped
    depends_on:
      b11k-live-postgis:
        condition: service_healthy
    environment:
      B11K_STRAVA_CLIENT_ID: ${B11K_STRAVA_CLIENT_ID:-}
      B11K_STRAVA_CLIENT_SECRET: ${B11K_STRAVA_CLIENT_SECRET:-}
      B11K_STRAVA_REDIRECT_URI: ${B11K_STRAVA_REDIRECT_URI:-}
      B11K_PG_HOST: b11k-live-db
      B11K_PG_PORT: "5432"
      B11K_PG_DATABASE: ${B11K_PG_DATABASE:-b11k_db}
      B11K_PG_USER: ${B11K_PG_USER:-b11k}
      B11K_PG_PASSWORD: ${B11K_PG_PASSWORD:?Set B11K_PG_PASSWORD in .env}
      B11K_WEB_HOST: ${B11K_WEB_HOST:-localhost}
      B11K_WEB_PORT: "8080"
      B11K_WEB_PROTOCOL: ${B11K_WEB_PROTOCOL:-http}
      B11K_DEV_RELOAD_TEMPLATES: "true"
      B11K_MOBILE_ACTIVITY_ORDER: ${B11K_MOBILE_ACTIVITY_ORDER:-stats_first}
      B11K_DISCOVERED_MAP_ENABLED: ${B11K_DISCOVERED_MAP_ENABLED:-true}
      B11K_DISCOVERED_REVEAL_RADIUS_METERS: ${B11K_DISCOVERED_REVEAL_RADIUS_METERS:-100}
      B11K_DISCOVERED_SAMPLE_DISTANCE_METERS: ${B11K_DISCOVERED_SAMPLE_DISTANCE_METERS:-50}
    ports:
      - "${B11K_WEB_HOST_PORT:-8080}:8080"
    volumes:
      - .:/workspace
      - ./config.docker.yaml:/workspace/config.yaml:ro
      - b11k-live-go-mod:/go/pkg/mod
      - b11k-live-go-build:/root/.cache/go-build

volumes:
  b11k-live-postgis-data:
  b11k-live-go-mod:
  b11k-live-go-build:
